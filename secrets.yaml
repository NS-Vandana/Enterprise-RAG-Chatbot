# Secrets are pulled from Azure Key Vault via the CSI driver.
# Set these in your Key Vault before deploying.
#
# Required Key Vault secrets:
#   groq-api-key
#   azure-openai-endpoint
#   azure-openai-api-key
#   azure-tenant-id
#   azure-client-id
#   qdrant-api-key
#   langchain-api-key
#   appinsights-connection-string

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: rag-keyvault-secrets
  namespace: production
spec:
  provider: azure
  secretObjects:
    - secretName: rag-secrets
      type: Opaque
      data:
        - objectName: groq-api-key
          key: groq-api-key
        - objectName: azure-openai-endpoint
          key: azure-openai-endpoint
        - objectName: azure-openai-api-key
          key: azure-openai-api-key
        - objectName: azure-tenant-id
          key: azure-tenant-id
        - objectName: azure-client-id
          key: azure-client-id
        - objectName: qdrant-api-key
          key: qdrant-api-key
        - objectName: langchain-api-key
          key: langchain-api-key
        - objectName: appinsights-connection-string
          key: appinsights-connection-string
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: ""       # fill in your managed identity client ID
    keyvaultName: "rag-enterprise-kv"
    cloudName: ""
    objects: |
      array:
        - |
          objectName: groq-api-key
          objectType: secret
        - |
          objectName: azure-openai-endpoint
          objectType: secret
        - |
          objectName: azure-openai-api-key
          objectType: secret
        - |
          objectName: azure-tenant-id
          objectType: secret
        - |
          objectName: azure-client-id
          objectType: secret
        - |
          objectName: qdrant-api-key
          objectType: secret
        - |
          objectName: langchain-api-key
          objectType: secret
        - |
          objectName: appinsights-connection-string
          objectType: secret
    tenantId: ""                     # fill in your Azure tenant ID
