name: Build, Eval & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME: yourcompanyacr
  AKS_CLUSTER: rag-chatbot-aks
  AKS_RG: rag-chatbot-rg
  IMAGE_BACKEND: rag-chatbot-backend
  IMAGE_FRONTEND: rag-chatbot-frontend

jobs:
  # ── 1. Lint & unit tests ───────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest pytest-asyncio

      - name: Lint (ruff)
        run: ruff check . --select E,F,W --ignore E501

      - name: Unit tests
        run: pytest tests/ -v --tb=short
        env:
          APP_ENV: development
          QDRANT_URL: http://localhost:6333

  # ── 2. RAGAS quality gate ──────────────────────────────────────────────
  eval:
    runs-on: ubuntu-latest
    needs: test
    # Only run evals on pushes to main, not PRs (too slow for PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spacy model
        run: python -m spacy download en_core_web_lg

      - name: Ingest eval documents
        run: python -m ingestion.ingest --dir evals/test_docs --dry-run
        env:
          QDRANT_URL: http://localhost:6333
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}

      - name: Run RAGAS evaluations
        run: python -m evals.ragas_eval --golden evals/golden_set.json
        env:
          APP_ENV: production
          QDRANT_URL: http://localhost:6333
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGCHAIN_PROJECT: rag-enterprise-ci

  # ── 3. Build Docker images ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: eval
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_BACKEND }}:cache
          cache-to: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_BACKEND }}:cache,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_FRONTEND }}:latest

  # ── 4. Deploy to AKS ──────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AKS_RG }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Substitute image tags in manifests
        run: |
          sed -i "s|IMAGE_TAG|${{ needs.build.outputs.image_tag }}|g" k8s/deployment.yaml

      - name: Deploy to AKS
        uses: azure/k8s-deploy@v5
        with:
          resource-group: ${{ env.AKS_RG }}
          name: ${{ env.AKS_CLUSTER }}
          manifests: |
            k8s/namespace.yaml
            k8s/secrets.yaml
            k8s/qdrant.yaml
            k8s/deployment.yaml
            k8s/service.yaml
            k8s/ingress.yaml
          images: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_BACKEND }}:${{ needs.build.outputs.image_tag }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_FRONTEND }}:${{ needs.build.outputs.image_tag }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/rag-chatbot-backend -n production --timeout=300s
          kubectl rollout status deployment/rag-chatbot-frontend -n production --timeout=300s

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "Deploy FAILED for ${{ github.sha }} by ${{ github.actor }}. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
